# --- CONFIGURATION DU DÉPLOIEMENT GSF (VANILLA) ---
[build]
  publish = "."
  command = "echo 'Déploiement GSF Consulting International en cours...'"

# --- RÉÉCRITURE DES ROUTES (Indispensable pour Netlify Identity) ---
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
  force = true

# --- HEADERS DE SÉCURITÉ ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
