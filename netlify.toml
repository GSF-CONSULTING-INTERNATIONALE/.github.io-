[build]
  # COMMANDE OBLIGATOIRE : On dit à Netlify de compiler avec Jekyll
  command = "jekyll build"
  
  # DOSSIER DE PUBLICATION : Jekyll génère le site dans le dossier _site
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"

# On garde vos redirections et headers qui sont corrects
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
