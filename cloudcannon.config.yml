# cloudcannon.config.yml - VERSION CORRIGÉE POUR STANDARD JEKYLL

collections_config:
  # Configuration de la collection "Posts" (Vos Analyses)
  posts:
    path: "_posts"           # On pointe vers le dossier standard Jekyll
    output: true             # On active la génération de pages HTML
    permalink: /analyses/:slug/  # Structure d'URL propre (ex: /analyses/ia-ohada/)
    name: "Analyses"
    icon: library_books
    description: "Vos publications juridiques et analyses stratégiques."
    _enabled_editors:
      - visual
      - content
    
    # Définition des champs dans l'interface CloudCannon
    _inputs:
      title:
        label: "Titre de l'analyse"
        type: text
      date:
        label: "Date de publication"
        type: datetime
      author:
        label: "Auteur"
        type: text
        default: "Gilles Feliho"
      image:
        label: "Image de couverture"
        type: image
      excerpt:
        label: "Résumé (extrait)"
        type: textarea
      layout:
        hidden: true  # On cache le layout car il sera défini par défaut
      categories:
        label: "Catégories"
        type: multiselect
        options:
          values: ["Conformité", "IA Juridique", "OHADA", "Recouvrement"]

  # Configuration des Pages fixes (Accueil, Mentions Légales)
  pages:
    path: ""
    name: "Pages"
    icon: wysiwyg
    description: "Pages principales du site (Accueil, Contact, etc.)"
    _inputs:
      layout:
        label: "Modèle de page"

# On supprime la section "data_config" car nous n'utilisons plus de JSON pour le blog.
# Cela simplifie grandement la gestion.