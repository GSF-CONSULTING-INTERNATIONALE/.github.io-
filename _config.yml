title: GSF Consulting International
description: Expertise Juridique & IA en Afrique
url: "https://gsfconsultinginternational.com"
author: Gilles Feliho

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

collections:
  posts:
    output: true
    permalink: /analyses/:title/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - hugo.toml
